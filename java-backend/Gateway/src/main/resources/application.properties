spring.application.name=Gateway

server.port=${PORT:8050}
server.address=0.0.0.0

# Startup optimization
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.example=INFO

# Management endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

springdoc.swagger-ui.urls[1].name=wishlist
springdoc.swagger-ui.urls[1].url=/wishlist/v3/api-docs

springdoc.swagger-ui.urls[2].name=auth
springdoc.swagger-ui.urls[2].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[3].name=post
springdoc.swagger-ui.urls[3].url=/post/v3/api-docs

springdoc.swagger-ui.urls[4].name=user
springdoc.swagger-ui.urls[4].url=/user/v3/api-docs
